services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: barberia
      POSTGRES_PASSWORD: barberia
      POSTGRES_DB: db_barberia
    ports:
      - "5432:5432"
    volumes:
    
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barberia -d db_barberia"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      PUERTO: ":8080"
      # En el contenedor usamos PostgreSQL. El host "db" es el nombre del servicio
      # de arriba: docker compose lo resuelve por DNS interno.
      DB_DRIVER: postgres
      DB_DSN: "host=db user=barberia password=barberia dbname=db_barberia port=5432 sslmode=disable TimeZone=America/Guayaquil"
      JWT_SECRETO: "cambia-esto-en-produccion"
      STORAGE: gorm
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata: